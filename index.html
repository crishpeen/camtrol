<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Webcam movement and gesture tracker powered by TensorFlow.js" />
  <title>Camtrol — Webcam Tracker</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>" />
</head>
<body>
  <header class="header">
    <div class="header__brand">
      <h1>Camtrol</h1>
      <p class="header__tagline">Webcam movement &amp; gesture tracker</p>
    </div>
    <div class="header__status" id="status-bar" aria-live="polite">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Initializing…</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel panel--video" aria-label="Camera preview">
      <div class="video-wrap">
        <video id="webcam" playsinline muted autoplay aria-label="Webcam feed"></video>
        <canvas id="overlay" aria-hidden="true"></canvas>
        <p class="video-placeholder" id="video-placeholder">Camera off</p>
      </div>
      <div class="video-controls">
        <button type="button" id="btn-start" class="btn btn--primary">Start camera</button>
        <button type="button" id="btn-stop" class="btn btn--secondary" disabled>Stop</button>
      </div>
    </section>

    <aside class="panel panel--sidebar">
      <section class="card" aria-label="Detector settings">
        <h2>Detectors</h2>
        <ul class="toggle-list">
          <li>
            <label class="toggle">
              <input type="checkbox" id="toggle-motion" checked />
              <span>Motion</span>
            </label>
          </li>
          <li>
            <label class="toggle">
              <input type="checkbox" id="toggle-hands" checked />
              <span>Hands &amp; gestures</span>
            </label>
          </li>
          <li>
            <label class="toggle">
              <input type="checkbox" id="toggle-pose" checked />
              <span>Body pose</span>
            </label>
          </li>
        </ul>
        <label class="slider-label" for="motion-sensitivity">
          Motion sensitivity
          <input type="range" id="motion-sensitivity" min="1" max="100" value="35" />
        </label>
      </section>

      <section class="card card--log" aria-label="Event log">
        <div class="card__header">
          <h2>Events</h2>
          <button type="button" id="btn-clear-log" class="btn btn--ghost btn--sm">Clear</button>
        </div>
        <ol id="event-log" class="event-log" reversed></ol>
        <p class="event-log-empty" id="event-log-empty">No events yet. Start the camera to begin tracking.</p>
      </section>
    </aside>
  </main>

  <footer class="footer">
  <p>Runs entirely in your browser. Video never leaves your device.</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
